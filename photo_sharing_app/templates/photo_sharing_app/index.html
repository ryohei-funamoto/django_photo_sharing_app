{% extends 'photo_sharing_app/layouts/base.html' %}
{% block content %}
    <div class="posts">
        {% for post in posts %}
            <a href="{% url 'photo_sharing_app:show' id=post.id %}" class="post">
                <div><img src="{{ post.image.url }}" alt=""></div>
            </a>
        {% empty %}
            <p>まだ投稿がありません。</p>
        {% endfor %}
    </div>
{% endblock %}
