{% extends 'photo_sharing_app/layouts/base.html' %}
{% block title %}ログインページ | {{ block.super }}{% endblock %}
{% block content %}
    <h1>ログインページ</h1>
    <form method="POST" novalidate>
        {% csrf_token %}
        {{ form.non_field_errors }}
        {% include 'photo_sharing_app/components/form.html' %}
        <div class="mt-3 text-center">
            <button type="submit" class="btn btn-primary">ログインする</button>
        </div>
        <input type="hidden" name="next" value="{{ next }}">
    </form>
{% endblock %}
