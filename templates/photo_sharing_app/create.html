{% extends 'photo_sharing_app/layouts/base.html' %}
{% block title %}投稿作成ページ | {{ block.super }}{% endblock %}
{% block content %}
    <h1>投稿作成ページ</h1>
    <form action="{% url 'photo_sharing_app:create' %}" method="POST" enctype="multipart/form-data" novalidate>
        {% csrf_token %}
        {% include 'photo_sharing_app/components/form.html' %}
        <div class="text-center mt-3">
            <button type="submit" class="btn btn-success">投稿する</button>
        </div>
    </form>
    <ul class="list-unstyled mt-3">
        <li class="text-center"><a href="{% url 'photo_sharing_app:index' %}" class="text-decoration-none">トップへ戻る</a></li>
    </ul>
{% endblock %}
