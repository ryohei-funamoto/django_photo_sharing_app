{% load widget_tweaks %}
{% for field in form %}
    <div class="mt-3">
        <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
        {% if field.errors %}
            {{ field | add_class:"form-control is-invalid" }}
            {% for error in field.errors %}
                <div class="invalid-feedback">{{ error }}</div>
            {% endfor %}
        {% else %}
            {{ field | add_class:"form-control" }}
        {% endif %}
    </div>
{% endfor %}
